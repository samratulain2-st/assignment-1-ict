<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <link rel="stylesheet" href="signup.css">
</head>
<body>
    <div class="input">
        <label for="Name">
            Name
        </label>
        <input type="text" name="Name" id="Name">
    </div>

    <div class="input">
        <label for="E-mail">
            Email:
        </label>
        <input type="email" name="E-mail" id="E-mail ">
    </div>

    <div class="input">
        <label for="Password">
            Password:
        </label>
        <input type="password" name="Password" id="Password">
    </div>

    <div class="input">
        <label for="male">
            Male:
        </label>
        <input type="radio" name="male" id="Password">
        <label for="female">
            Female:
        </label>
        <input type="radio" name="female" id="Password">
    </div>
    
    
    <div class="input">
        <label for="Accept">
            Terms
        </label>
        <input type="checkbox" name="Accept" id="Password">
             
        
    </div>

    <div class="input">
        <center><button class="Accept-btn">Accept</button</center>


    </div>
    
    
</body>
</html>
